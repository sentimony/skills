<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ECharts vanilla example</title>
  <style>
    /* Container must have a real size before echarts.init */
    #chart { width: 100%; height: 400px; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script type="module">
    // CDN import so this file works standalone; in a bundled project
    // use `import * as echarts from 'echarts'` instead. The version is
    // pinned to an exact release (not a floating `@6`) so this example
    // loads one known build; ESM imports can't carry an SRI `integrity`
    // hash, so pinning is the available integrity control here.
    import * as echarts from 'https://cdn.jsdelivr.net/npm/echarts@6.1.0/+esm';

    const el = document.getElementById('chart');
    const chart = echarts.init(el);

    const data = Array.from({ length: 200 }, (_, i) => [
      Date.now() - (200 - i) * 3600_000,
      Math.round(50 + 30 * Math.sin(i / 10) + Math.random() * 10),
    ]);

    chart.setOption({
      tooltip: { trigger: 'axis' },
      xAxis: { type: 'time' },
      yAxis: { type: 'value' },
      dataZoom: [{ type: 'inside' }, { type: 'slider' }],
      series: [{ type: 'line', showSymbol: false, data }],
    });

    // Observe the container, not the window, so panel/sidebar
    // layout changes also trigger a resize.
    const observer = new ResizeObserver(() => chart.resize());
    observer.observe(el);

    // Teardown pattern for SPA/route-change scenarios; a standalone
    // static page reclaims everything on unload anyway.
    window.addEventListener('pagehide', () => {
      observer.disconnect();
      chart.dispose();
    });
  </script>
</body>
</html>
